apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  MONGODB_URL: {{ .Values.mongodb.url | quote }}
  MONGODB_USER: {{ .Values.mongodb.auth.rootUser | quote }}
  MONGODB_PASSWORD: {{ .Values.mongodb.auth.rootPassword | quote }}
  REDIS_PASSWORD: {{ .Values.redis.password | quote }}
  MINIO_ACCESS_KEY: {{ .Values.minio.accessKey | quote }}
  MINIO_SECRET_KEY: {{ .Values.minio.secretKey | quote }}
  FIREBASE_CREDENTIALS_BASE64: {{ .Values.firebase.credentialsBase64 | quote }}
  OPENAI_API_KEY: {{ .Values.llm.openaiApiKey | quote }}
  ANTHROPIC_API_KEY: {{ .Values.llm.anthropicApiKey | quote }}
  GOOGLE_AI_API_KEY: {{ .Values.llm.googleAiApiKey | quote }}
