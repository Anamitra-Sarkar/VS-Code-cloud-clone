http:
  routers:
    backend-api:
      rule: "PathPrefix(`/api`)"
      service: backend-svc
      entryPoints:
        - websecure
      tls: {}

    frontend-app:
      rule: "PathPrefix(`/`)"
      service: frontend-svc
      entryPoints:
        - websecure
      tls: {}
      priority: 1

    workspace-proxy:
      rule: "PathPrefix(`/workspace`)"
      service: backend-svc
      entryPoints:
        - websecure
      tls: {}

  services:
    backend-svc:
      loadBalancer:
        servers:
          - url: "http://backend:7860"

    frontend-svc:
      loadBalancer:
        servers:
          - url: "http://frontend:3000"

  middlewares:
    rate-limit:
      rateLimit:
        average: 100
        burst: 50
    cors-headers:
      headers:
        accessControlAllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        accessControlAllowOriginList:
          - "*"
        accessControlAllowHeaders:
          - Authorization
          - Content-Type
